# ATHENA Reflection System Configuration
# Step 2: Recursion & Learning
# Version: 1.0.0

protocol:
  name: "ATHENA Reflection"
  version: "1.0.0"
  handshake_required: true
  verification_code: "ATHENA-REFLECTION-VERIFIED"

# Learning Configuration
learning:
  enabled: true
  decay_factor: 0.95
  min_samples: 3
  max_history: 1000
  feature_weights:
    success_rate: 0.4
    duration: 0.3
    complexity: 0.3

# Recursion Configuration
recursion:
  max_depth: 3
  early_termination: true
  confidence_threshold: 0.5
  depth_penalty: 0.1

# Pattern Recognition Configuration
patterns:
  threshold: 3
  similarity_threshold: 0.75
  min_confidence: 0.6
  pattern_types:
    - high_success_task
    - low_success_task
    - recurring_error
    - increasing_duration
    - high_performance_hour
    - low_performance_hour
    - temporal
    - cross_project

# Cross-Project Learning Configuration
cross_project:
  enabled: true
  share_anonymized: true
  max_projects: 10
  similarity_metric: "cosine"
  transfer_threshold: 0.7

# Self-Optimization Configuration
optimization:
  enabled: true
  target_metrics:
    - success_rate
    - duration
    - throughput
    - resource_usage
  min_improvement: 0.05
  max_suggestions: 10
  validation_required: true

# Persistence Configuration
persistence:
  enabled: true
  path: "./data/reflection"
  auto_save: true
  save_interval: 100
  formats:
    - json
    - yaml

# Performance Configuration
performance:
  background_processing: true
  parallel_detection: false
  cache_size: 100
  timeout_ms: 5000

# Logging Configuration
logging:
  level: "INFO"
  log_patterns: true
  log_optimizations: true
  log_cross_project: true
  ledger_format: true
