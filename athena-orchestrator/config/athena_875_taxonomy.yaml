# ATHENA 875 Protocol - Industry Taxonomy Configuration
# Purpose: Define 10-industry marketplace categories with deterministic scoring rules
# Protocol Version: 1.0.0
# Compliance: ATHENA-875-2026
#
# LEDGER NOTE: Initial taxonomy structure created 2026-02-09
# RISK: Changes to industry keywords may affect classification accuracy across system

protocol:
  name: "ATHENA 875"
  version: "1.0.0"
  compliance_date: "2026-02-09"
  handshake_required: true
  verification_code: "ATHENA-875-VERIFIED"

classification:
  min_score: 3
  min_margin: 1
  confidence_threshold: 0.65

industries:
  technology:
    id: 1
    label: "Technology & Software"
    description: "Software development, IT services, cloud computing, SaaS"
    keywords:
      primary:
        - software
        - technology
        - cloud
        - saas
        - api
        - platform
        - development
        - programming
        - infrastructure
        - devops
      secondary:
        - app
        - application
        - system
        - server
        - database
        - framework
        - code
        - automation
        - integration
        - microservices
    scoring:
      primary_weight: 2.0
      secondary_weight: 1.0
      domain_bonus: 1.5

  finance:
    id: 2
    label: "Finance & Banking"
    description: "Banking, investments, fintech, payments, financial services"
