# Task Contract YAML Schema
# This schema defines the structure for task Intermediate Representation (IR)

$schema: "http://json-schema.org/draft-07/schema#"
title: TaskContract
description: Stable Intermediate Representation for a task
type: object
required:
  - id
  - name
  - input
  - status
properties:
  id:
    type: string
    description: Unique task identifier
    pattern: "^[a-zA-Z0-9_-]+$"
    minLength: 1
    maxLength: 100

  name:
    type: string
    description: Human-readable task name
    minLength: 1
    maxLength: 255

  input:
    type: object
    description: Task input data
    default: {}

  output:
    type: object
    description: Task output data
    default: null

  status:
    type: string
    enum:
      - pending
      - running
      - completed
      - failed
      - cancelled
    default: pending

  metadata:
    type: object
    properties:
      priority:
        type: string
        enum: [low, normal, high, critical]
        default: normal
      timeout_seconds:
        type: integer
        minimum: 1
        maximum: 3600
        default: 300
      retry_count:
        type: integer
        minimum: 0
        maximum: 5
        default: 0
      tags:
        type: array
        items:
          type: string
        default: []
      created_by:
        type: string
        default: null
      source:
        type: string
        default: null
      custom:
        type: object
        default: {}
    default:
      priority: normal
      timeout_seconds: 300
      retry_count: 0
      tags: []
      custom: {}

  created_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp

  updated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp

  started_at:
    type: string
    format: date-time
    default: null

  completed_at:
    type: string
    format: date-time
    default: null

  error:
    type: string
    default: null

  adapter_name:
    type: string
    description: Adapter used for execution
    default: null
